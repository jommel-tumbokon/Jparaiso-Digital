<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jparaiso-Digital</title>
  <!-- Gumamit tayo ng Inter font para maganda agad tingnan -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="admin-layout">
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-logo">Admin <span>Dashboard</span></div>
      <nav class="admin-nav">
        <a href="#" class="nav-link active" data-section="general">General Settings</a>
        <a href="#" class="nav-link" data-section="hero">Hero Section</a>
        <a href="#" class="nav-link" data-section="products">Products</a>
        <a href="#" class="nav-link" data-section="footer">Footer & Socials</a>
      </nav>
      <div class="admin-footer">
        <a href="index.html" class="btn-view-site">View Live Site &rarr;</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">
      <header class="admin-header">
        <h1 id="page-title">General Settings</h1>
        <button id="save-config-btn" class="btn-save">Save Changes</button>
      </header>

      <!-- FORMS CONTAINER -->
      <div class="admin-content">
        
        <!-- GENERAL SETTINGS FORM -->
        <section id="section-general" class="form-section active">
          <div class="form-group">
            <label for="input-shopName">Shop Name</label>
            <input type="text" id="input-shopName" class="form-input" placeholder="e.g. DSR">
          </div>

          <div class="form-group">
            <label for="input-tagline">Tagline</label>
            <input type="text" id="input-tagline" class="form-input" placeholder="e.g. THIS IS MY HERO">
          </div>

          <div class="form-group">
            <label for="input-primaryColor">Primary Color</label>
            <input type="color" id="input-primaryColor" class="form-input-color" value="#ff0000">
          </div>
        </section>

        <!-- HERO SECTION FORM -->
<section id="section-hero" class="form-section">
    <div class="form-group">
      <label for="input-heroTitle">Hero Title</label>
      <input type="text" id="input-heroTitle" class="form-input" placeholder="e.g. DSR COLLECTION">
    </div>
  
    <div class="form-group">
      <label for="input-heroSubtitle">Hero Subtitle</label>
      <input type="text" id="input-heroSubtitle" class="form-input" placeholder="e.g. Premium Streetwear">
    </div>
  
    <div class="form-group">
      <label for="input-heroButton">Hero Button Text</label>
      <input type="text" id="input-heroButton" class="form-input" placeholder="e.g. BUY NOW">
    </div>
  
    <div class="form-group">
      <label for="input-heroVideo">Hero Video Path</label>
      <input type="text" id="input-heroVideo" class="form-input" placeholder="e.g. assets/products/hero.mp4">
    </div>
  </section>
  
  <!-- PRODUCTS SECTION -->
  <section id="section-products" class="form-section">
    <div class="product-list" id="admin-product-list">
      <!-- Dito ilalagay ng JS ang existing products -->
    </div>
    
    <button type="button" id="add-product-btn" class="btn-add-product" style="margin-top: 20px; width: 100%; padding: 12px; background: #f4f4f5; border: 2px dashed #d4d4d8; border-radius: 6px; cursor: pointer; font-weight: 600; color: #52525b;">
      + Add New Product
    </button>
  </section>
  
  <!-- FOOTER & SOCIALS SECTION -->
  <section id="section-footer" class="form-section">
    <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #18181b;">Social Media Links</h3>
    
    <div class="form-group">
      <label for="input-socialInstagram">Instagram URL</label>
      <input type="text" id="input-socialInstagram" class="form-input" placeholder="https://instagram.com/...">
    </div>
  
    <div class="form-group">
      <label for="input-socialTiktok">TikTok URL</label>
      <input type="text" id="input-socialTiktok" class="form-input" placeholder="https://tiktok.com/...">
    </div>
  
    <div class="form-group">
      <label for="input-socialYoutube">YouTube URL</label>
      <input type="text" id="input-socialYoutube" class="form-input" placeholder="https://youtube.com/...">
    </div>
  
    <h3 style="font-size: 16px; font-weight: 600; margin: 24px 0 16px; color: #18181b;">Newsletter</h3>
  
    <div class="form-group">
      <label for="input-newsletterTitle">Newsletter Title</label>
      <input type="text" id="input-newsletterTitle" class="form-input" placeholder="e.g. SUBSCRIBE">
    </div>
  
    <div class="form-group">
      <label for="input-newsletterPlaceholder">Email Placeholder</label>
      <input type="text" id="input-newsletterPlaceholder" class="form-input" placeholder="e.g. Enter your email">
    </div>
  
    <div class="form-group">
      <label for="input-newsletterFormAction">Formspree Action URL</label>
      <input type="text" id="input-newsletterFormAction" class="form-input" placeholder="https://formspree.io/f/...">
    </div>
  
    <h3 style="font-size: 16px; font-weight: 600; margin: 24px 0 16px; color: #18181b;">Copyright</h3>
  
    <div class="form-group">
      <label for="input-footerCopyright">Copyright Text</label>
      <input type="text" id="input-footerCopyright" class="form-input" placeholder="e.g. All rights reserved.">
    </div>
  </section>

      </div>
    </main>
  </div>

  <!-- LOAD CONFIG FIRST, THEN ADMIN JS -->
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
